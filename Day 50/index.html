<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reels</title>
    <link rel="stylesheet" href="style.css" />
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"/>
  </head>
  <body>
    <main>
      <section>
        <div class="sidebar">
          <div class="like">
            <h3><i class="ri-heart-3-line"></i></h3>
            <h4 class="likeCount">123</h4>
          </div>
          <div class="comment">
            <h3><i class="ri-chat-3-line"></i></h3>
            <h4 class="cmntCount">123</h4>
          </div>
          <div class="share">
            <h3><i class="ri-share-forward-line"></i></h3>
            <h4 class="shareCount">123</h4>
          </div>
          <div class="menu">
            <h3><i class="ri-more-2-line"></i></h3>
          </div>
        </div>

        <div class="allReels">
          <div class="reel">
            <video
              loop
              muted
              src="https://assets.mixkit.co/videos/42320/42320-720.mp4"
            ></video>
            <div class="bottom-bar">
              <div class="profile">
                <img
                  src="https://images.unsplash.com/photo-1618375689347-b91336e01381?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  alt=""
                />
                <h4>John Doe</h4>
                <button class="follow">Follow</button>
            </div>
            <p>hagu hagu hagu</p>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
